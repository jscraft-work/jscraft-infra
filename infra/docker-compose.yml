services:
  postgres:
    container_name: postgres
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: bj_auth
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    networks:
      - jscraft

  redis:
    container_name: redis
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - jscraft

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ../nginx:/etc/nginx/conf.d:ro
      - ../web/tetris:/usr/share/nginx/html/tetris:ro
      - ${ALT_FAST_DIST}:/usr/share/nginx/html/alt:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8080:80"
    networks:
      - jscraft

volumes:
  postgres-data:
  redis-data:

networks:
  jscraft:
    name: jscraft
    driver: bridge
