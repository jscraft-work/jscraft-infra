services:
  alt-web-app:
    container_name: alt-web-app
    image: ghcr.io/${GHCR_OWNER}/alt:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      LOADER_MAIN: work.jscraft.alt.AltWebApplication
    ports:
      - "8081:8081"
    networks:
      - jscraft

  alt-trading-worker:
    container_name: alt-trading-worker
    image: ghcr.io/${GHCR_OWNER}/alt:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      LOADER_MAIN: work.jscraft.alt.AltTradingWorkerApplication
    # LLM HTTP wrapper (launchd on the host, 127.0.0.1:18000) is reached via
    # host.docker.internal — declared explicitly for cross-platform Docker compatibility.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - jscraft

  alt-collector-worker:
    container_name: alt-collector-worker
    image: ghcr.io/${GHCR_OWNER}/alt:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      LOADER_MAIN: work.jscraft.alt.AltCollectorWorkerApplication
    # News assessment also calls the host LLM wrapper.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - jscraft

networks:
  jscraft:
    external: true
