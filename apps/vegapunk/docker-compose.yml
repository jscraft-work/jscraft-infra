services:
  vegapunk:
    container_name: vegapunk
    image: ghcr.io/jscraft-work/vegapunk:latest
    restart: unless-stopped
    ports:
      - "9002:8000"
    # 호스트 LLM 래퍼(127.0.0.1:18000)를 host.docker.internal 로 호출
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # GH_CLIENT_ID / GH_CLIENT_SECRET 은 GitHub secrets → env-sync → .env.
    # (secret 이름은 GITHUB_ 접두사 금지라 GH_* 사용)
    env_file:
      - .env
    environment:
      # 전부 비밀 아님(주소·설정). PKCE 공개클라이언트라 client secret 없음.
      LLM_BASE_URL: http://host.docker.internal:18000
      LLM_LEVEL: high   # nanobot(--no-markdown, raw) — 중첩 리스트 들여쓰기 보존. normal=openclaw는 평면화함
      REDIS_URL: redis://redis:6379
      AUTH_ENABLED: "1"
      AUTH_BASE_URL: https://auth.jscraft.work
      AUTH_INTERNAL_URL: http://bj-auth:9000
      OAUTH_CLIENT_ID: vegapunk-web
      OAUTH_REDIRECT_URI: https://vegapunk.jscraft.work/auth/callback
      OAUTH_SCOPE: openid profile
      COOKIE_SECURE: "1"
      # GitHub OAuth. GITHUB_CLIENT_ID/SECRET 은 GitHub secrets → env-sync → .env.
      GITHUB_ENABLED: "1"
      GITHUB_REDIRECT_URI: https://vegapunk.jscraft.work/auth/callback/github
      VEGAPUNK_DB: /app/data/vegapunk.db
      HF_HOME: /app/models
    volumes:
      - vegapunk-data:/app/data       # sqlite (대화·페이지)
      - vegapunk-models:/app/models   # fastembed 모델 캐시 (~2.2GB, 1회 다운로드)
    networks:
      - jscraft

volumes:
  vegapunk-data:
  vegapunk-models:

networks:
  jscraft:
    external: true
